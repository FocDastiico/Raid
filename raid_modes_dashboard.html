<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raid Dashboard - Chefes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a131d;
      --bg2: #111f31;
      --panel: #142537;
      --line: #2a4663;
      --text: #edf5ff;
      --muted: #98b0cc;
      --accent: #57d4aa;
      --accent2: #ffc86a;
      --danger: #ff8f8f;
      --ok: #89efc7;
      --shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      background:
        radial-gradient(1200px 600px at 0% -10%, #18324b 0%, transparent 60%),
        radial-gradient(900px 500px at 100% 0%, #3f2f15 0%, transparent 55%),
        linear-gradient(145deg, #09111b 0%, #0f1a28 45%, #09111b 100%);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap { max-width: 1240px; margin: 0 auto; display: grid; gap: 14px; }

    .hero, .card {
      background: linear-gradient(165deg, rgba(22, 37, 55, 0.96), rgba(17, 31, 49, 0.96));
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .hero { padding: 18px; }
    .hero h1 { margin: 0; font-family: "Manrope", sans-serif; font-size: clamp(1.3rem, 2.6vw, 1.9rem); }
    .hero p { margin: 6px 0 0; color: var(--muted); }

    .top {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 12px;
    }

    .card { padding: 12px; }
    .label { color: var(--muted); font-size: .8rem; margin-bottom: 8px; }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab {
      border: 1px solid #365675;
      background: #0f1b29;
      color: #cfe0f5;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .tab.active { background: linear-gradient(160deg, rgba(87,212,170,.2), rgba(255,200,106,.2)); border-color: #4fbe9a; color: #fff; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .stat {
      border: 1px solid #2a4663;
      border-radius: 10px;
      padding: 10px;
      background: #0f1d2c;
    }
    .stat .k { color: var(--muted); font-size: .74rem; }
    .stat .v { font-family: "Manrope", sans-serif; font-size: 1.35rem; font-weight: 800; margin-top: 4px; }

    .main {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 12px;
    }

    .search {
      width: 100%;
      border: 1px solid #335473;
      border-radius: 10px;
      background: #0f1b29;
      color: #e6f1ff;
      padding: 10px 12px;
      font-family: inherit;
    }

    .roster {
      margin-top: 10px;
      max-height: 58vh;
      overflow: auto;
      display: grid;
      gap: 7px;
      padding-right: 4px;
    }

    .row {
      border: 1px solid #2a4560;
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: #102031;
    }

    .name { font-size: .9rem; }
    .mini {
      border: 1px solid #3c5f80;
      background: #132437;
      color: #d8e8fb;
      border-radius: 8px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: .76rem;
      font-weight: 700;
    }

    .mini:hover { border-color: #57d4aa; color: #fff; }

    .selected {
      margin-top: 10px;
      display: grid;
      gap: 8px;
      max-height: 58vh;
      overflow: auto;
      padding-right: 4px;
    }

    .pick {
      border: 1px solid #2f4d6a;
      border-radius: 10px;
      padding: 9px 10px;
      background: #102031;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .pill {
      border: 1px solid #355678;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: .72rem;
      color: #cbe0fa;
      background: #13263a;
    }

    .remove {
      border: 1px solid #734646;
      background: #2a1d22;
      color: #ffb3b3;
      border-radius: 8px;
      padding: 5px 9px;
      cursor: pointer;
      font-size: .75rem;
      font-weight: 700;
    }

    .empty { color: var(--muted); font-size: .88rem; padding: 8px 2px; }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid #355678;
      background: #132639;
      color: #dce9fa;
      border-radius: 9px;
      padding: 8px 10px;
      font-size: .8rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.primary { border-color: #4db995; background: #143227; color: #a6f7d6; }
    .btn.warn { border-color: #7a5c3c; background: #2b2418; color: #ffd9a0; }

    .preset-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: .8rem;
    }

    @media (max-width: 980px) {
      .top, .main { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .roster, .selected { max-height: 36vh; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Dashboard de Chefes</h1>
      <p>Separado por: <strong>Chefe do Cla</strong>, <strong>Hydra</strong> e <strong>Quimera</strong>. Selecione os campeoes por modo e salve localmente.</p>
    </section>

    <section class="top">
      <article class="card">
        <div class="label">Modo</div>
        <div class="tabs">
          <button class="tab active" data-mode="cb">Chefe do Cla</button>
          <button class="tab" data-mode="hydra">Hydra</button>
          <button class="tab" data-mode="chimera">Quimera</button>
        </div>
      </article>
      <article class="card">
        <div class="label">Resumo</div>
        <div class="stats">
          <div class="stat"><div class="k">Chefe do Cla</div><div class="v" id="count-cb">0</div></div>
          <div class="stat"><div class="k">Hydra</div><div class="v" id="count-hydra">0</div></div>
          <div class="stat"><div class="k">Quimera</div><div class="v" id="count-chimera">0</div></div>
        </div>
      </article>
    </section>

    <section class="main">
      <article class="card">
        <div class="label">Seu Roster</div>
        <input id="search" class="search" type="text" placeholder="Buscar campeao..." />
        <div id="rosterList" class="roster"></div>
      </article>

      <article class="card">
        <div class="label">Selecionados no modo atual</div>
        <div id="selectedList" class="selected"></div>
        <div class="actions">
          <button id="applyHydraPresetBtn" class="btn primary" type="button">Aplicar Time Hydra (Wixwell)</button>
          <button id="copyBtn" class="btn primary" type="button">Copiar Lista do Modo</button>
          <button id="clearModeBtn" class="btn warn" type="button">Limpar Modo Atual</button>
          <button id="clearAllBtn" class="btn" type="button">Limpar Tudo</button>
        </div>
        <div class="preset-note">Preset Hydra: Vault Keeper Wixwell, Mithrala, Uugo, Maulie, Artak, Rathalos.</div>
      </article>
    </section>
  </main>

  <script src="./roster_data.js"></script>
  <script>
    const modeLabels = {
      cb: "Chefe do Cla",
      hydra: "Hydra",
      chimera: "Quimera"
    };

    const storageKey = "raid_modes_dashboard_v1";
    const hydraWixwellPreset = [
      "Vault Keeper Wixwell",
      "Mithrala Lifebane",
      "Uugo",
      "Maulie Tankard",
      "Artak",
      "Rathalos Blademaster"
    ];
    const allNames = Array.isArray(window.RAID_ROSTER_NAMES) ? window.RAID_ROSTER_NAMES.slice().sort() : [];

    let state = loadState();
    let activeMode = "cb";

    function loadState() {
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return { cb: [], hydra: [], chimera: [] };
        const parsed = JSON.parse(raw);
        return {
          cb: Array.isArray(parsed.cb) ? parsed.cb : [],
          hydra: Array.isArray(parsed.hydra) ? parsed.hydra : [],
          chimera: Array.isArray(parsed.chimera) ? parsed.chimera : []
        };
      } catch {
        return { cb: [], hydra: [], chimera: [] };
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function applyHydraPreset() {
      const allowed = new Set(allNames);
      state.hydra = hydraWixwellPreset.filter(name => allowed.has(name));
      saveState();
      updateStats();
      if (activeMode === "hydra") {
        renderSelected();
        renderRoster();
      }
    }

    function updateStats() {
      document.getElementById("count-cb").textContent = state.cb.length.toString();
      document.getElementById("count-hydra").textContent = state.hydra.length.toString();
      document.getElementById("count-chimera").textContent = state.chimera.length.toString();
    }

    function switchMode(mode) {
      activeMode = mode;
      document.querySelectorAll(".tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });
      renderSelected();
      renderRoster();
    }

    function addToMode(name) {
      const arr = state[activeMode];
      if (!arr.includes(name)) {
        arr.push(name);
        arr.sort((a, b) => a.localeCompare(b));
        saveState();
        updateStats();
        renderSelected();
        renderRoster();
      }
    }

    function removeFromMode(name) {
      state[activeMode] = state[activeMode].filter(x => x !== name);
      saveState();
      updateStats();
      renderSelected();
      renderRoster();
    }

    function renderRoster() {
      const q = (document.getElementById("search").value || "").trim().toLowerCase();
      const inMode = new Set(state[activeMode]);
      const target = document.getElementById("rosterList");
      target.innerHTML = "";

      const filtered = allNames.filter(name => name.toLowerCase().includes(q)).slice(0, 250);
      if (!filtered.length) {
        const el = document.createElement("div");
        el.className = "empty";
        el.textContent = "Nenhum campeao encontrado.";
        target.appendChild(el);
        return;
      }

      filtered.forEach(name => {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="name">${name}</div>
          ${inMode.has(name)
            ? `<span class="pill">Ja no modo</span>`
            : `<button class="mini" type="button">Adicionar</button>`}
        `;
        if (!inMode.has(name)) {
          row.querySelector("button").onclick = () => addToMode(name);
        }
        target.appendChild(row);
      });
    }

    function renderSelected() {
      const target = document.getElementById("selectedList");
      target.innerHTML = "";
      const arr = state[activeMode];

      if (!arr.length) {
        const el = document.createElement("div");
        el.className = "empty";
        el.textContent = `Nenhum campeao selecionado para ${modeLabels[activeMode]}.`;
        target.appendChild(el);
        return;
      }

      arr.forEach(name => {
        const row = document.createElement("div");
        row.className = "pick";
        row.innerHTML = `
          <div>${name}</div>
          <button class="remove" type="button">Remover</button>
        `;
        row.querySelector("button").onclick = () => removeFromMode(name);
        target.appendChild(row);
      });
    }

    function setupActions() {
      document.querySelectorAll(".tab").forEach(btn => {
        btn.onclick = () => switchMode(btn.dataset.mode);
      });

      document.getElementById("search").addEventListener("input", renderRoster);

      document.getElementById("applyHydraPresetBtn").onclick = () => {
        applyHydraPreset();
        switchMode("hydra");
      };

      document.getElementById("copyBtn").onclick = async () => {
        const arr = state[activeMode];
        const text = [
          `${modeLabels[activeMode]} - Lista de Campeoes`,
          "",
          ...(arr.length ? arr.map((n, i) => `${i + 1}. ${n}`) : ["(sem campeoes selecionados)"])
        ].join("\n");
        await navigator.clipboard.writeText(text);
      };

      document.getElementById("clearModeBtn").onclick = () => {
        state[activeMode] = [];
        saveState();
        updateStats();
        renderSelected();
        renderRoster();
      };

      document.getElementById("clearAllBtn").onclick = () => {
        state = { cb: [], hydra: [], chimera: [] };
        saveState();
        updateStats();
        renderSelected();
        renderRoster();
      };
    }

    setupActions();
    applyHydraPreset();
    updateStats();
    renderSelected();
    renderRoster();
  </script>
</body>
</html>
