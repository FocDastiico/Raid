        <div class="filter-block">
          <div class="filter-title">Maestrias</div>
          <div class="toggle-chip-row">
            ${renderToggleChip({ group: "masteries", value: "full", label: "Com maestrias", checked: state.filterMasteries.has("full") })}
            ${renderToggleChip({ group: "masteries", value: "not_full", label: "Sem maestrias", checked: state.filterMasteries.has("not_full") })}
          </div>
        </div>
      `;

      toggleWrap.querySelectorAll('input[type="checkbox"]').forEach((input) => {
        input.addEventListener("change", (event) => {
          const group = event.target.dataset.filterGroup;
          const value = event.target.dataset.filterValue;
          const targetSet = group === "rarity"
            ? state.selectedRarities
            : group === "books"
              ? state.filterBooks
              : state.filterMasteries;

          if (event.target.checked) {
            targetSet.add(value);
          } else {
            targetSet.delete(value);
          }

          renderChampions();
        });
      });

      const filtered = getFilteredChampions();

      const wrap = document.getElementById("championGrid");
      wrap.className = "champion-grid hh-list";
      if (!filtered.length) {
        wrap.innerHTML = `<div class="champ-empty-state">Nenhum campeão corresponde aos filtros atuais.</div>`;
        return;
      }
      wrap.innerHTML = filtered.map((champ) => {
        const profileCandidates = getChampionProfileCandidates(champ);
        const profileSrc = profileCandidates[0] || "";
        const sets = (champ.equippedSets || []).slice(0, 6);
        const stats = champ.buildStats || {};
        const baseStats = champ.baseStats || {};
        const bonusStats = champ.bonusStats || {};
        const factionName = getFactionName(champ);
        const displayName = getChampionDisplayName(champ);
        const secondaryName = champ.shortName && safeText(champ.shortName) !== safeText(champ.name)
          ? safeText(champ.name)
          : "";
        const statusTags = [
          translateRarity(champ.rarity),
          `Grau ${formatNumber(champ.grade)}`,
          translateAffinity(champ.affinity || ""),
          safeText(factionName),
          champ.inStorage ? "Armazenado" : "Ativo",
          champ.locked ? "Bloqueado" : "",
          champ.hydraLocked ? "Travado na Hidra" : ""
        ].filter(Boolean);
        const setCards = sets.map((set) => {
          const iconSrc = getSetIconSrc(set.setId);
          const iconFallbackSrc = getSetIconFallbackSrc(set.setId);
          return `
            <div class="champ-set-card" title="${safeText(set.name)} x${set.count}">
              <div class="champ-set-icon-wrap">
                ${iconSrc ? `<img class="champ-set-icon" src="${safeText(iconSrc)}" alt="${safeText(set.name)}" loading="lazy" data-fallback-src="${safeText(iconFallbackSrc)}" onerror="handleSetIconError(this)">` : ``}
              </div>
              <div class="champ-set-text">
                <div class="champ-set-name">${safeText(set.name)}</div>
                <div class="champ-set-sub">${formatNumber(set.count)} peças equipadas</div>
              </div>
              <div class="champ-set-count">x${formatNumber(set.count)}</div>
            </div>
          `;
        }).join("");
        const renderGameStyleStat = (key) => {
          const total = Number(stats[key] ?? 0);
          const base = Number(baseStats[key] ?? 0);
          const bonus = Number(bonusStats[key] ?? Math.max(0, total - base));
          const suffix = key === "cRate" || key === "cDmg" ? "%" : "";
          return `${formatNumber(total)}${suffix} | ${formatNumber(base)}${suffix} + ${formatNumber(bonus)}${suffix}`;
        };
        const statTiles = [
          ["HP", renderGameStyleStat("hp")],
          ["ATQ", renderGameStyleStat("atk")],
          ["DEF", renderGameStyleStat("def")],
          ["VEL", renderGameStyleStat("spd")],
          ["ACC", renderGameStyleStat("acc")],
          ["RES", renderGameStyleStat("res")],
          ["T.CRT", renderGameStyleStat("cRate")],
          ["D.CRT", renderGameStyleStat("cDmg")]
        ];
        const quickFacts = [
          { label: "Livros", value: `+${formatNumber(champ.booksApplied)}` },
          { label: "Maestrias", value: `${formatNumber(champ.masteryTotal)}/15` },
          { label: "Itens", value: `${formatNumber(champ.equippedItemCount)}/9` },
          Number(champ.awakenedGrade) > 0 ? { label: "Despertar", value: formatNumber(champ.awakenedGrade) } : null,
          Number(champ.empowerLevel) > 0 ? { label: "Empoderamento", value: `+${formatNumber(champ.empowerLevel)}` } : null
        ].filter(Boolean);
        return `
          <article class="champ-row">
            <div class="champ-portrait">
              <img
                src="${safeText(profileSrc)}"
                alt="${safeText(champ.name)}"
                loading="lazy"
                data-fallback-srcs="${safeText(profileCandidates.slice(1).join("|"))}"
                data-fallback-label="${safeText(getChampionShortLabel(champ.name))}"
                onerror="handleChampionPortraitError(this)"
              >
              <div class="champ-level-badge">${champ.level}</div>
            </div>
            <div class="champ-row-body">
              <div class="champ-row-top">
                <div class="champ-name-block">
                  <div class="champ-kicker">${translateRole(champ.role || "Indefinido")}${factionName ? ` - ${safeText(factionName)}` : ""}</div>
                  <div class="champ-name-line">
                    <div>
                      <h3 class="champ-name">${safeText(displayName)}</h3>
                      ${secondaryName ? `<div class="champ-name-secondary">${secondaryName}</div>` : ``}
                    </div>
                  </div>
                  <div class="champ-tag-row">
                    ${statusTags.map((tag) => `<span class="champ-tag">${safeText(tag)}</span>`).join("")}
                  </div>
                </div>
                <div class="champ-role-pill">${translateRole(champ.role || "-")}</div>
              </div>
              <div class="champ-summary-grid">
                <section class="champ-panel">
                  <div class="champ-panel-head">
                    <span class="champ-panel-title">Build atual</span>
                    <span class="mini-note">${formatNumber(champ.equippedItemCount)} itens equipados</span>
                  </div>
                  <div class="champ-stats-grid">
                    ${statTiles.map(([label, value]) => `
                      <div class="champ-stat">
                        <span class="champ-stat-label">${label}</span>
                        ${renderChampionStatValue(value)}
                      </div>
                    `).join("")}
                  </div>
                  <div class="champ-fact-row">
                    ${quickFacts.map((fact) => `
                      <span class="champ-fact"><b>${safeText(fact.label)}:</b> ${safeText(fact.value)}</span>
                    `).join("")}
                  </div>
                </section>
                <section class="champ-panel">
                  <div class="champ-panel-head">
                    <span class="champ-panel-title">Sets equipados</span>
                    <span class="mini-note">${sets.length ? `${formatNumber(sets.length)} tipos ativos` : "Nenhum conjunto detectado"}</span>
                  </div>
                  ${sets.length
                    ? `<div class="champ-set-grid">${setCards}</div>`
                    : `<div class="champ-empty-note">Sem itens equipados neste campeão no snapshot atual.</div>`}
                </section>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderSetCards() {
      const grid = document.getElementById("setGrid");
      const table = document.getElementById("setItemTable");
      const sets = DATA.itemSets || [];
      if (state.activeSetId === null && sets.length) {
        state.activeSetId = sets[0].setId;
      }
      grid.innerHTML = sets.map((set) => `
        <article class="set-card ${set.setId === state.activeSetId ? "active" : ""}" data-set-id="${set.setId}">
          <h3 class="set-name">${safeText(getSetDisplayName(set))}</h3>
          <div class="set-sub">${set.count} itens - ${set.equipped} equipados</div>
          <div class="set-meta">
            ${Object.entries(set.bySlot || {}).slice(0, 4).map(([slot, qty]) => `<span class="mini-pill">${translateSlot(slot)}: ${qty}</span>`).join("")}
          </div>
        </article>
      `).join("");

      grid.querySelectorAll("[data-set-id]").forEach((card) => {
        card.addEventListener("click", () => {
          state.activeSetId = Number(card.dataset.setId);
          renderSetCards();
        });
      });

      const activeSet = sets.find((set) => set.setId === state.activeSetId) || sets[0];
      table.innerHTML = (activeSet?.items || []).map((item) => `
        <tr>
          <td>${safeText(getSetDisplayName(item.setName ? item : activeSet))}</td>
          <td>${safeText(item.slotName || translateSlot(item.slot))}</td>
          <td>${item.rank}</td>
          <td>${translateRarity(item.rarity)}</td>
          <td>${item.level}</td>
          <td>${item.equipped ? "Sim" : "Não"}</td>
          <td>${translateItemDescription(item.desc)}</td>
        </tr>
      `).join("");
    }

    function setupTabs() {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
          document.querySelectorAll(".view").forEach((view) => view.classList.remove("active"));
          tab.classList.add("active");
          document.querySelector(`.view[data-view="${tab.dataset.view}"]`).classList.add("active");
        });
      });
    }

    function setupGlobalClickClose() {
      document.addEventListener("click", () => {
        if (!state.openSelect) return;
        state.openSelect = "";
        renderBossSelectors();
      });
    }

    function init() {
      state.teamSelections = loadSavedTeams();
      state.selectedBossId = DATA.bosses[0]?.id || "";
      state.selectedDifficulty = DATA.bosses[0]?.difficulty || "";
      state.selectedDungeon = DATA.bosses[0]?.label || "";
      renderMeta();
      renderBossView();
      setupBossReset();
      setupBossActions();
      renderChampions();
      renderSetCards();
      setupTabs();
      setupGlobalClickClose();
    }

    init();
  </script>
</body>
</html>
